<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eric Zhu</title>
<meta name="description" content="Eric Zhu — mathematics and biology at Stanford. work experience, projects, contact.">
<meta name="color-scheme" content="light dark">
<link rel="icon" type="image/png" href="icons/favicon2.png">

<style>
/* ============================================================================
   TOKENS
   Palette is deliberately cool, not cream. The one accent is Coomassie blue —
   the stain that turns up on every protein gel Eric has run. It appears only
   on links, focus, and the hover state of a work entry. Nowhere else.
   ========================================================================= */
:root {
  --paper:      #f4f5f6;
  --paper-2:    #eceef0;   /* barely-there hover wash */
  --ink:        #14171a;
  --ink-muted:  #5d6670;
  --ink-faint:  #8a939c;
  --rule:       #d9dde0;
  --accent:     #17458c;   /* Coomassie */
  --accent-dim: #17458c33;

  /* syntax tokens — keywords reuse --accent; the rest are muted so the
     block reads coloured, not neon. */
  --tok-str:    #2e7d4f;   /* strings — green */
  --tok-num:    #9a5b00;   /* numbers — amber */
  --tok-fn:     #7a3ba8;   /* function / builtin names — violet */

  --serif: "Charter", "Bitstream Charter", "Iowan Old Style", "Sitka Text", Cambria, Georgia, serif;
  --mono:  ui-monospace, "SF Mono", "SFMono-Regular", "Cascadia Mono", "Roboto Mono", Menlo, Consolas, monospace;

  --measure: 40rem;   /* 640px content column — the brief's constraint */
  --rail:    8rem;    /* the margin. section labels and dates live out here —
                         sized to the longest label ("what came of it"), no wider */
  --gutter:  1.25rem;    /* air between rail and content. the page widens to pay for it,
                         the measure never does. */
  --first-line: 1.55rem;  /* every section's first line box. rail labels use it too,
                             which is what keeps a label optically level with its content. */
  --prose-line: calc(1.125rem * 1.62);  /* a detail-page prose paragraph's first line box
                             (body font-size × line-height). Its rail label matches it so the
                             header centers on the taller reading line, not the --first-line one. */

  --link-space: 1.2rem;  /* total gap before an inline "↗" link — the space between a
                            title/name and its link, shared by projects AND
                            extracurriculars. Change it here to move both at once. */

  --step: 180ms;
}
@media (prefers-color-scheme: dark) {
  :root {
    --paper:      #101315;
    --paper-2:    #171b1e;
    --ink:        #e4e7e9;
    --ink-muted:  #96a0a8;
    --ink-faint:  #6d767e;
    --rule:       #2a3034;
    --accent:     #8fb4e8;
    --accent-dim: #8fb4e844;
    --tok-str:    #8ec6a4;
    --tok-num:    #d6a76a;
    --tok-fn:     #c8a6e6;
  }
}

/* ============================================================================
   BASE
   ========================================================================= */
*, *::before, *::after { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--serif);
  font-size: 1.125rem;
  line-height: 1.62;
  font-kerning: normal;
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
}
p { margin: 0 0 1.1rem; }
p:last-child { margin-bottom: 0; }
ul, ol { margin: 0; padding: 0; }

a { color: inherit; }
a:focus-visible,
.skip:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 1px; }

.skip {
  position: absolute; left: -9999px;
  font-family: var(--mono); font-size: .8rem;
  background: var(--paper); color: var(--accent);
  padding: .5rem .75rem; z-index: 10;
}
.skip:focus { left: 1rem; top: 1rem; }

.sr-only {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip-path: inset(50%); white-space: nowrap;
}

/* ============================================================================
   SPINE — a two-column grid: margin rail + measure. Every block sits on it,
   so section labels, dates and back-links all hang in the same left margin,
   like the marginalia in a lab notebook. Below 60rem the rail folds on top.
   Whitespace does the separating — no rules, no lines.
   ========================================================================= */
.wrap {
  max-width: calc(var(--rail) + var(--gutter) + var(--measure));
  margin-inline: auto;
  padding: 5.5rem 2rem 6rem;
}
.block {
  display: grid;
  grid-template-columns: var(--rail) minmax(0, var(--measure));
  column-gap: var(--gutter);
  margin-bottom: 6rem;
}
.block:last-child { margin-bottom: 0; }
.block > .rail { grid-column: 1; position: relative; text-align: right; }
.block > .body { grid-column: 2; min-width: 0; }

.rail-label, .rail-note {
  margin: 0;
  font-family: var(--mono);
  font-size: .75rem;
  font-weight: 400;
  line-height: var(--first-line);
  letter-spacing: .05em;
  text-transform: lowercase;
  color: var(--ink-faint);
}
.rail-label {
  position: relative;
  white-space: nowrap;
}
.rail-label::before {
  content: "";
  position: absolute;
  top: -.5rem; right: 0;   /* sits in the gap above, so the label text itself doesn't shift */
  width: 2.25rem;   /* a fraction of the rail, not the full column */
  border-top: 1px solid var(--rule);
}
.rail-note { margin-top: -.3rem; }   /* trims the leading above a display-size title */

@media (max-width: 60rem) {
  .wrap { padding-top: 3.5rem; }
  .block { grid-template-columns: minmax(0, 1fr); }
  .block > .rail { grid-column: 1; text-align: left; margin-bottom: .9rem; }
  .block > .body { grid-column: 1; }
  .rail-note { margin-top: 0; }
  .rail-label::before { right: auto; left: 0; }
}

/* ============================================================================
   INTRO
   ========================================================================= */
.name {
  margin: -.3rem 0 1.4rem;
  font-family: var(--serif);
  font-size: 2.1rem;
  font-weight: 600;
  line-height: 1.15;
  letter-spacing: -.012em;
}
.lede { font-size: 1.19rem; }
.lede-2 { color: var(--ink-muted); font-size: 1.0rem; line-height: 1.6; }

/* ============================================================================
   FILTER — a subject switch that sits below the intro, above the work. Pick a
   subject and every entry whose `subjects` don't include it collapses away
   (animated height + fade, see setCollapsed()); the rest reflow up. A section
   that ends up empty collapses whole. "everything" resets. The control is a
   custom listbox, not a native <select>, so it can wear the page's mono voice.
   Subjects live on each WORK / PROJECT / EXTRACURRICULAR object as a
   `subjects: ["biology", ...]` array — edit them in the CONTENT block.
   ========================================================================= */
/* the control sits inline under the intro paragraph — a little air above it,
   a faint lead-in word, the dropdown, then the live count. Wraps on narrow
   screens. No section header, no rail label. */
.filter-row {
  display: flex; align-items: center; flex-wrap: wrap;
  gap: .6rem .85rem;
  margin-top: 1.9rem;
}
.filter-lead {
  font-family: var(--mono);
  font-size: .72rem;
  letter-spacing: .06em;
  text-transform: lowercase;
  color: var(--ink-faint);
}
.filter { position: relative; display: inline-block; }
.filter-btn {
  display: inline-flex; align-items: center; gap: .55rem;
  margin: 0;
  padding: .42rem .3rem .42rem .75rem;
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 3px;
  font-family: var(--mono);
  font-size: .8rem;
  letter-spacing: .04em;
  text-transform: lowercase;
  color: var(--ink);
  cursor: pointer;
  transition: border-color var(--step) ease, color var(--step) ease;
}
.filter-btn:hover { border-color: var(--accent); }
.filter-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.filter-label { line-height: 1; color: var(--accent); }
.filter-label.is-active { color: var(--accent); }
.filter-caret {
  display: inline-block;
  padding: 0 .35rem;
  font-size: .62rem;
  color: var(--ink-faint);
  transition: transform var(--step) ease, color var(--step) ease;
}
.filter[data-open="true"] .filter-caret { transform: rotate(180deg); color: var(--accent); }

.filter-menu {
  position: absolute;
  top: calc(100% + .4rem); left: 0;
  z-index: 6;
  min-width: 100%;
  margin: 0;
  padding: .3rem;
  list-style: none;
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 4px;
  box-shadow: 0 8px 30px -14px rgba(0,0,0,.45);
  opacity: 0;
  transform: translateY(-.35rem);
  pointer-events: none;
  transition: opacity var(--step) ease, transform var(--step) ease;
}
.filter[data-open="true"] .filter-menu { opacity: 1; transform: translateY(0); pointer-events: auto; }
.filter-opt {
  display: flex; align-items: center; gap: .55rem;
  padding: .42rem .6rem;
  border-radius: 2px;
  font-family: var(--mono);
  font-size: .8rem;
  letter-spacing: .04em;
  text-transform: lowercase;
  color: var(--ink-muted);
  white-space: nowrap;
  cursor: pointer;
  transition: background var(--step) ease, color var(--step) ease;
}
.filter-opt:hover { background: var(--paper-2); color: var(--ink); }
.filter-opt:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
.filter-opt[aria-selected="true"] { color: var(--accent); }
.filter-dot {
  flex: none;
  width: .42rem; height: .42rem;
  border-radius: 1px;
  background: var(--rule);
  transition: background var(--step) ease;
}
.filter-opt:hover .filter-dot { background: var(--ink-faint); }
.filter-opt[aria-selected="true"] .filter-dot { background: var(--accent); }
.filter-hint {
  margin: 0;
  font-family: var(--mono);
  font-size: .72rem;
  letter-spacing: .03em;
  color: var(--ink-faint);
}

/* a hidden entry's height is animated to 0, then it's set display:none in JS.
   this rule keeps a collapsed extracurricular from leaving its separator line
   above whatever follows it mid-transition. */
.project.is-collapsed + .project { border-top-color: transparent; }

/* ============================================================================
   WORK ENTRIES
   Tags are segmented top-rules, not pills — read them as a strip of tabs:
   one stint per segment, so a history is visible at a glance. On hover the
   segments take the ink of the accent and an arrow appears out in the rail.
   ========================================================================= */
.entries { list-style: none; }
.entry { position: relative; isolation: isolate; }   /* own stacking context, so the layers below stay local to the card */
/* spacing lives on the bottom (not the top) so that when the FIRST entry of a
   section is filtered away, the next one rises flush to its rail label rather
   than carrying a leading gap. setCollapsed() animates this to 0 as an entry
   folds shut, so neighbours slide up without a jump. */
.entry { margin-bottom: 2.1rem; }
.entry:last-child { margin-bottom: 0; }

/* the hover / focus wash is its own layer, sitting BEHIND the card's content
   (z-index: -1) so it can never paint over the title. Roomier than the type,
   without shifting it. */
.entry::before {
  content: "";
  position: absolute;
  inset: -.55rem -.7rem -.75rem;
  z-index: -1;
  border-radius: 2px;
  background: transparent;
  transition: background var(--step) ease;
  pointer-events: none;
}
.entry:has(.entry-hit:hover)::before,
.entry:has(.entry-hit:focus-visible)::before { background: var(--paper-2); }

/* the whole card is one link — a stretched, empty overlay <a> sized to the
   entry. It's transparent and sits ON TOP (so the whole card is clickable and
   nothing is hidden); the wash above and the type below show through it. Making
   it an overlay — rather than wrapping the card's contents — lets a second, real
   link, an optional homepage link, sit beside the title without nesting anchors. */
.entry-hit {
  position: absolute;
  inset: -.55rem -.7rem -.75rem;
  z-index: 1;
  border-radius: 2px;
}
.entry-hit:focus-visible { outline: 2px solid var(--accent); outline-offset: 0; }
/* the homepage link rides above the overlay so it stays independently clickable.
   Its lead-in space is driven by --link-space, the same token the extracurricular
   links use, so both move together. */
.entry-home { position: relative; z-index: 2; margin-left: calc(var(--link-space) - .5rem); }  /* less the .entry-head flex gap (.5) */

.entry-head {
  display: flex;
  align-items: baseline;   /* so a homepage link sits on the title's baseline, exactly like the extracurricular links */
  gap: 0 .5rem;
  line-height: var(--first-line);
}
/* the boxed mark and the reveal arrow stay optically centered, as before —
   only the text-baseline items (title, homepage link) share the baseline. */
.entry-head .mark,
.entry-head .arrow { align-self: center; }
.entry-title {
  margin: 0;
  font-size: 1.19rem;
  font-weight: 600;
  line-height: var(--first-line);
  letter-spacing: -.005em;
  color: var(--ink);
  transition: color var(--step) ease;
}
.entry-hit:hover ~ .entry-head .entry-title,
.entry-hit:focus-visible ~ .entry-head .entry-title { color: var(--accent); }

/* the arrow sits at the right edge of the entry, out of the rail's way */
.arrow {
  margin-left: auto;
  font-family: var(--mono);
  font-size: .95rem;
  line-height: 1;
  color: var(--accent);
  opacity: 0;
  transform: translateX(-.35rem);
  transition: opacity var(--step) ease, transform var(--step) ease;
}
.entry-hit:hover ~ .entry-head .arrow,
.entry-hit:focus-visible ~ .entry-head .arrow { opacity: 1; transform: translateX(0); }

.entry-blurb {
  margin: .35rem 0 0;
  color: var(--ink-muted);
  font-size: 1rem;
  line-height: 1.55;
}

.tags {
  display: flex; flex-wrap: wrap;
  gap: 0 1.1rem;
  list-style: none;
  margin: .8rem 0 0;
}
.tag {
  border-top: 1px solid var(--rule);
  padding-top: .38rem;
  font-family: var(--mono);
  font-size: .72rem;
  letter-spacing: .045em;
  text-transform: lowercase;
  color: var(--ink-muted);
  white-space: nowrap;
  transition: border-color var(--step) ease, color var(--step) ease;
}
.tag .yr { color: var(--ink-faint); margin-left: 1.2rem; }
.entry-hit:hover ~ .tags .tag,
.entry-hit:focus-visible ~ .tags .tag { border-top-color: var(--accent); color: var(--ink); }

/* ----------------------------------------------------------------------------
   INSTITUTION MARKS — a boxed two-letter symbol, set like an element on the
   periodic table, or a real logo — either an inline SVG (icon.svg) or an
   actual image URL (icon.img) can be dropped in instead of the letter pair.
   ------------------------------------------------------------------------- */
.mark {
  display: inline-flex; align-items: center; justify-content: center;
  flex: none;
  min-width: 1.3rem; height: 1.3rem;
  margin-left: .35rem;   /* extra air between the title and the mark */
  padding: 0 .22rem;
  border: 1px solid var(--rule);
  border-radius: 2px;
  font-family: var(--mono);
  font-size: .62rem;
  font-weight: 500;
  line-height: 1;
  letter-spacing: .02em;
  color: var(--ink-faint);
  transition: border-color var(--step) ease, color var(--step) ease;
}
.mark--svg {
  border: 0; padding: 0;
  min-width: 1.3rem; height: 1.3rem;   /* matches the letter marks' new size, just square instead of boxed */
}
.mark svg { width: 100%; height: 100%; fill: currentColor; }
/* raster logo (icon.img): recolored to a single flat palette tone. The trick is
   that the source image is used ONLY as an alpha MASK (--tint-mask, an SVG <mask>
   generated per-icon by mark()) over a solid fill of the mark's current ink
   color — --ink-faint by default, --accent on hover. The image itself is never
   painted, so none of its own colors or its dark outer edge can show: the only
   thing on screen is the flat fill, cut to the logo's shape, its edge fading
   cleanly from ink to paper. The logo's detail survives because its negative
   space (here the tree, maze and caduceus) is transparent and stays unpainted,
   letting the paper read through. NOTE: this treats a logo as a silhouette; a
   full-bleed photo with no transparency would flatten to a solid shape — the
   right trade for the institution marks this slot holds. */
.mark--img {
  background: currentColor;
  -webkit-mask-image: var(--tint-mask);
  mask-image: var(--tint-mask);
}
.entry-hit:hover ~ .entry-head .mark,
.entry-hit:focus-visible ~ .entry-head .mark { border-color: var(--accent); color: var(--accent); }

/* ============================================================================
   PROJECTS — deliberately lighter. one line, one link, no ceremony.
   ========================================================================= */
.projects { list-style: none; }
.project {
  display: flex; flex-wrap: wrap; align-items: baseline;
  gap: 0 .6rem;
  padding: .7rem 0;
  line-height: var(--first-line);   /* first line box matches the rail label's */
}
.project:first-child { padding-top: 0; }   /* this is what was pushing the list off the label */
.project + .project { border-top: 1px solid var(--rule); }
.exp-name { font-weight: 600; margin-right: calc(var(--link-space) - .6rem); }  /* less the .project flex gap (.6) */
.exp-year { font-family: var(--mono); font-size: .72rem; letter-spacing: .045em; color: var(--ink-faint); margin-left: auto; }
.exp-desc { flex: 1 1 100%; margin: .1rem 0 0; color: var(--ink-muted); font-size: 1rem; line-height: 1.5; }

.link, .exp-link {
  color: var(--accent);
  text-decoration: underline;
  text-decoration-color: var(--accent-dim);
  text-decoration-thickness: 1px;
  text-underline-offset: .18em;
  transition: text-decoration-color var(--step) ease;
}
.link:hover, .exp-link:hover { text-decoration-color: var(--accent); }
.exp-link { font-family: var(--mono); font-size: .75rem; letter-spacing: .04em; }

/* ============================================================================
   ELSEWHERE
   ========================================================================= */
.elsewhere { list-style: none; display: grid; gap: .5rem; line-height: var(--first-line); }
.elsewhere .k {
  display: inline-block; min-width: 5.5rem;
  font-family: var(--mono); font-size: .75rem; letter-spacing: .045em;
  text-transform: lowercase; color: var(--ink-faint);
}
.colophon {
  margin-top: 4.5rem;
  font-family: var(--mono); font-size: .72rem; line-height: 1.7;
  letter-spacing: .03em; color: var(--ink-faint);
}

/* ============================================================================
   PROJECT PAGE — same spine, so every project reads identically:
   context / my role / what i did / what came of it / links, labels in the margin.
   ========================================================================= */
.title-row { display: flex; align-items: center; gap: 0 .55rem; }
.title-row .mark { min-width: 1.45rem; height: 1.45rem; font-size: .68rem; }
.title-row .mark--svg { width: 1.45rem; height: 1.45rem; }
.proj-title {
  margin: -.3rem 0 0;
  font-size: 1.9rem;
  font-weight: 600;
  line-height: 1.2;
  letter-spacing: -.012em;
}
.proj-blurb { margin: .8rem 0 0; color: var(--ink-muted); font-size: 1.06rem; }
.proj-title + .tags { margin-top: 1.2rem; }

/* a representative image + caption, sitting below the title/blurb and above the
   prose. The image is centered and its width is set inline per-entry (figure.width
   in the CONTENT block); it never overflows the measure. The caption below is
   italic, smaller, lighter, and centered. */
.figure { margin: 1.9rem 0 -2.5rem; text-align: center; }   /* negative bottom trims the gap to the prose below */
.figure-img {
  display: block;
  margin: 0 auto;
  width: 100%;          /* the default; overridden inline by figure.width */
  max-width: 100%;      /* never wider than the content column */
  height: auto;
  border-radius: 3px;
}
.figure-cap {
  margin-top: .3rem;
  font-style: italic;
  font-size: .85rem;
  line-height: 1.5;
  color: var(--ink-faint);
}
.back { text-decoration: none; color: var(--ink-muted); transition: color var(--step) ease; }
.back:hover { color: var(--accent); }
.prose ul { list-style: none; }
.prose li { position: relative; padding-left: 1.1rem; margin-bottom: .6rem; }
.prose li::before {
  content: "\2013";
  position: absolute; left: 0; top: 0;
  color: var(--ink-faint);
}
.prose li:last-child { margin-bottom: 0; }
/* prose reads at a taller line-height than a rail label, so instead of shrinking
   its first line (which browsers apply unreliably via ::first-line), we grow the
   label's line box to match — both boxes are then equal and top-aligned, so the
   header centers on the first line of text exactly like the homepage sections. */
.rail-label--prose { line-height: var(--prose-line); }
.links-list { list-style: none; display: grid; gap: .45rem; font-size: 1rem; line-height: var(--first-line); }

.pager {
  display: flex; flex-wrap: wrap; gap: 1rem 2rem; justify-content: space-between;
  border-top: 1px solid var(--rule);
  padding-top: 1.1rem;
  font-family: var(--mono); font-size: .78rem; letter-spacing: .04em;
}
.pager a { text-decoration: none; color: var(--ink-muted); transition: color var(--step) ease; }
.pager a:hover { color: var(--accent); }
.pager .nxt { display: inline-flex; align-items: flex-start; gap: .4rem; }
.pager .nxt .nxt-col { display: flex; flex-direction: column; text-align: right; }
.pager .nxt .nxt-lead { margin-bottom: .15rem; }
.pager .nxt .nxt-title { color: var(--ink-faint); font-size: .72rem; }

/* ============================================================================
   THE PIN — sticks to the top while you scroll and names the section you're in.
   Sits over the rail, so it reads as the current margin label rather than a
   navbar. Fades out at the top of the page, where the answer is obvious.
   ========================================================================= */
.pin-layer {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 5;
  pointer-events: none;
  display: flex; justify-content: center;
}
.pin-inner {
  width: 100%;
  max-width: calc(var(--rail) + var(--gutter) + var(--measure));
  padding: 0 2rem;
}
.pin {
  display: inline-flex; align-items: center; gap: .4rem;
  margin-top: 1.1rem;
  padding: .3rem .6rem;
  border: 1px solid var(--accent-dim);
  border-radius: 3px;
  background: var(--paper);
  font-family: var(--mono);
  font-size: .72rem;
  font-weight: 500;
  letter-spacing: .05em;
  text-transform: lowercase;
  color: var(--accent);
  opacity: 0;
  transform: translateY(-.25rem);
  transition: opacity var(--step) ease, transform var(--step) ease;
}
.pin.on { opacity: 1; transform: translateY(0); }
.pin::before {
  content: "";
  width: .3rem; height: .3rem;
  background: var(--accent);
  border-radius: 1px;
}

@media (max-width: 60rem) {
  .pin-inner { padding: 0; }
  .pin {
    display: flex; width: 100%;
    margin-top: 0;
    padding: .5rem 1.5rem;
    border: 0; border-bottom: 1px solid var(--rule); border-radius: 0;
  }
}

/* ============================================================================
   CODE / PSEUDOCODE — a shaded monospace slab. Built from the same paper-2
   wash as the hover states and the rule colour for its edge, so it reads as
   part of the page rather than a pasted-in embed. Long lines scroll inside
   the block; the measure never widens. An optional caption names the file,
   language, or "pseudocode". Deliberately un-highlighted — one ink colour,
   the way a lab notebook would have it. Lightly syntax-highlighted: keywords
   in the accent blue, strings green, numbers amber, function names violet —
   see renderCode() for the tokeniser that adds these classes.
   ========================================================================= */
.code {
  margin: 1.3rem 0;
  border: 1px solid var(--rule);
  border-radius: 4px;
  background: var(--paper-2);
  overflow: hidden;   /* clips the caption's corners to the rounded frame */
}
.code figcaption {
  padding: .5rem .9rem;
  border-bottom: 1px solid var(--rule);
  font-family: var(--mono);
  font-size: .7rem;
  letter-spacing: .05em;
  text-transform: lowercase;
  color: var(--ink-faint);
}
.code pre {
  margin: 0;
  padding: .95rem 1.1rem;
  overflow-x: auto;   /* long lines scroll here, not on the page body */
  font-family: var(--mono);
  font-size: .82rem;
  line-height: 1.6;
  color: var(--ink);
  tab-size: 2;
}
.code code { font: inherit; color: inherit; white-space: pre; }
/* comments (whole-line, trailing, or a {{! …}} marker) render dimmed. */
.code .c { color: var(--ink-faint); }
/* syntax tokens — added by renderCode(). */
.code .tok-kw  { color: var(--accent); }
.code .tok-str { color: var(--tok-str); }
.code .tok-num { color: var(--tok-num); }
.code .tok-fn  { color: var(--tok-fn); }
/* states for a block whose source is pulled from an external file */
.code .code-loading { color: var(--ink-faint); }
.code .code-err     { color: var(--ink-faint); white-space: pre-wrap; }

   LINK STUBS — a link with href: null renders as a dotted, greyed stub, so a
   dead URL never ships by accident.
   ========================================================================= */
.ph { text-decoration: underline dotted var(--accent-dim); text-underline-offset: .22em; text-decoration-thickness: 1px; }

   ========================================================================= */
#view { transition: opacity var(--step) ease, transform var(--step) ease; }
#view.leaving { opacity: 0; transform: translateY(4px); }
#view:focus { outline: none; }
h1[tabindex]:focus { outline: none; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition: none !important; animation: none !important; }
}

  '<section class="block"' + (secId ? ' id="' + secId + '"' : "") +
    (isHeading ? ' aria-labelledby="' + isHeading + '"' : "") + ">" +
    '<div class="rail' + (rail ? "" : " rail--empty") + '">' + rail + "</div>" +
    '<div class="body">' + body + "</div>" +
  "</section>";

/* ---------- home ---------- */
function home() {
  const intro = block(
    '<p class="rail-note">' + t(PROFILE.railNote) + "</p>",
    '<h1 class="name" tabindex="-1">' + t(PROFILE.name) + "</h1>" +
    '<p class="lede">' + t(PROFILE.lede[0]) + "</p>" +
    '<p class="lede-2">' + t(PROFILE.lede[1]) + "</p>" +
    filterControl()
  );

  const work     = entrySection(WORK,     "work experience", "h-work", "work");
  const projects = entrySection(PROJECTS, "projects",      "h-proj", "project");

  const exps = block(
    '<h2 class="rail-label" id="h-exp">extracurriculars</h2>',
    '<ul class="projects">' + EXTRACURRICULARS.map(e =>
      '<li class="project" data-subjects="' + esc((e.subjects || []).join(" ")) + '">' +
        '<span class="exp-name">' + t(e.name) + "</span>" +
        (e.links || []).map(l => l.href
          ? '<a class="exp-link" href="' + esc(l.href) + '" target="_blank" rel="noopener">' + t(l.label) + " \u2197</a>"
          : '<span class="exp-link ph">' + t(l.label) + "</span>").join("") +
        '<span class="exp-year">' + t(e.year) + "</span>" +
        '<p class="exp-desc">' + t(e.desc) + "</p>" +
      "</li>").join("") + "</ul>",
    "h-exp", "sec-extras"
  );

  const contact = block(
    '<h2 class="rail-label" id="h-else">elsewhere</h2>',
    '<ul class="elsewhere">' + PROFILE.elsewhere.map(l =>
      '<li><span class="k">' + t(l.k) + "</span>" + link(l) + "</li>").join("") + "</ul>" +
    '<p class="colophon">' + t(PROFILE.colophon) + "</p>",
    "h-else"
  );

  return { title: PROFILE.name, html: intro + work + projects + exps + contact };
}

/* the filter control — a custom listbox in the page's mono voice. It rides
   inline under the intro (no section header of its own). Behaviour (open/close,
   keyboard, and the entry-hiding itself) is wired in setupFilter(), which runs
   after each home paint. */
function filterControl() {
  const opts = [{ key: "", label: "everything" }].concat(SUBJECTS);
  return (
    '<div class="filter-row">' +
      '<div class="filter" id="filter" data-open="false">' +
        '<button class="filter-btn" id="filterBtn" type="button" aria-haspopup="listbox" ' +
          'aria-expanded="false" aria-controls="filterMenu">' +
          '<span class="filter-label" id="filterLabel">everything</span>' +
          '<span class="filter-caret" aria-hidden="true">▾</span>' +
        "</button>" +
        '<ul class="filter-menu" id="filterMenu" role="listbox" aria-label="Filter entries by subject">' +
          opts.map(o =>
            '<li class="filter-opt" role="option" tabindex="-1" data-subject="' + esc(o.key) + '" aria-selected="false">' +
              '<span class="filter-dot" aria-hidden="true"></span>' + esc(o.label) +
            "</li>").join("") +
        "</ul>" +
      "</div>" +
      '<span class="filter-hint" id="filterHint">showing everything</span>' +
    "</div>"
  );
}

/* an entry section \u2014 the rich, subpage-linked list. WORK and PROJECTS both use
   it; only the label, heading id and route prefix differ. */
function entrySection(list, label, id, route) {
  return block(
    '<h2 class="rail-label" id="' + id + '">' + label + "</h2>",
    '<ol class="entries">' + list.map(p =>
      '<li class="entry" data-subjects="' + esc((p.subjects || []).join(" ")) + '">' +
        /* the stretched overlay link \u2014 covers the whole card, navigates to
           the subpage. Empty, so its accessible name is the aria-label. */
        '<a class="entry-hit" href="#/' + route + '/' + esc(p.slug) + '" aria-label="' + plain(p.title) + '"></a>' +
        '<div class="entry-head">' +
          '<h3 class="entry-title">' + t(p.title) + "</h3>" +
          mark(p.icon) +
          homeLinks(p.links) +
          '<span class="arrow" aria-hidden="true">\u2192</span>' +
        "</div>" +
        tags(p.tags) +
        '<p class="entry-blurb">' + t(p.blurb) + "</p>" +
      "</li>").join("") + "</ol>",
    id, "sec-" + route
  );
}

/* links marked with `home` appear on the homepage card too, beside the title,
   styled like the extracurricular links. `home: true` reuses the link's label;
   `home: "short text"` uses that string as the homepage label instead. They
   ride on top of the card's overlay link, so they open independently — in a
   new tab, like the extracurricular links. */
const homeLinks = list => (list || [])
  .filter(l => l.home && l.href)
  .map(l =>
    '<a class="exp-link entry-home" href="' + esc(l.href) + '"' +
    (/^mailto:/.test(l.href) ? "" : ' target="_blank" rel="noopener"') +
    ">" + t(typeof l.home === "string" ? l.home : l.label) + " ↗</a>")
  .join("");

/* ---------- a project / work detail page ---------- */
function detail(sec, slug) {
  const list = sec.list;
  const i = list.findIndex(p => p.slug === slug);
  if (i < 0) return notFound();
  const p = list[i];
  const next = list[(i + 1) % list.length];

  let html = block(
    '<p class="rail-note"><a class="back" href="#/">\u2190 ' + sec.back + "</a></p>",
    '<div class="title-row"><h1 class="proj-title" tabindex="-1">' + t(p.title) + "</h1>" + mark(p.icon) + "</div>" +
    tags(p.tags) +
    '<p class="proj-blurb">' + t(p.blurb) + "</p>" +
    figureBlock(p.figure)
  );

  const parts = [
    ["context",       p.context],
    ["my role",       p.role],
    ["what i did",    p.did],
    ["what came of it", p.outcome]
  ];
  parts.forEach(([label, val], n) => {
    if (!val) return;
    const id = "h-" + n;
    html += block(
      '<h2 class="rail-label rail-label--prose" id="' + id + '">' + label + "</h2>",
      '<div class="prose">' + prose(val) + "</div>",
      id
    );
  });

  if (p.links && p.links.length) {
    html += block(
      '<h2 class="rail-label" id="h-links">links</h2>',
      '<ul class="links-list">' + p.links.map(l => "<li>" + link(l) + "</li>").join("") + "</ul>",
      "h-links"
    );
  }

  html += block("", '<nav class="pager" aria-label="Project navigation">' +
      '<a href="#/">\u2190 all ' + sec.back + "</a>" +
      '<a class="nxt" href="#/' + sec.route + "/" + esc(next.slug) + '"><span class="nxt-col"><span class="nxt-lead">next</span><span class="nxt-title">' + t(next.title) + '</span></span><span class="nxt-arw">\u2192</span></a>' +
    "</nav>");

  return { title: p.title + " — " + PROFILE.name, html };
}

function notFound() {
  return {
    title: "Not found — " + PROFILE.name,
    html: block(
      '<p class="rail-note">404</p>',
      '<h1 class="name" tabindex="-1">Nothing here</h1>' +
      '<p class="lede-2">That page doesn\'t exist. <a class="link" href="#/">Back to the work</a>.</p>'
    )
  };
}

/* ---------- router ---------- */
const view = document.getElementById("view");
const announce = document.getElementById("announce");
const reduced = matchMedia("(prefers-reduced-motion: reduce)");

/* each entry section maps to a route prefix, its list, and the words the detail
   page uses for its back-link and pager ("← work" / "← projects"). */
const SECTIONS = {
  work:    { list: WORK,     back: "work",     route: "work" },
  project: { list: PROJECTS, back: "projects", route: "project" }
};

function resolve() {
  const m = location.hash.match(/^#\/(work|project)\/([\w-]+)$/);
  return m && SECTIONS[m[1]] ? detail(SECTIONS[m[1]], m[2]) : home();
}

function paint() {
  const page = resolve();
  view.innerHTML = page.html;
  document.title = page.title;
  announce.textContent = page.title;
  window.scrollTo(0, 0);
  const h1 = view.querySelector("h1");
  if (h1) h1.focus({ preventScroll: true });
  indexPin();
  hydrateCode();
  setupFilter();
}

/* fills any code block whose source is an external file (a { codeFile } in the
   content). Runs after paint, fetches each file, drops it in. Fails soft with
   a one-line hint when the page is opened as file://, where fetch is blocked. */
async function hydrateCode() {
  for (const fig of view.querySelectorAll(".code[data-src]")) {
    const src = fig.getAttribute("data-src");
    const codeEl = fig.querySelector("code");
    fig.removeAttribute("data-src");   /* mark handled, so it isn't refetched */
    try {
      const res = await fetch(src);
      if (!res.ok) throw new Error(res.status);
      codeEl.className = "";
      codeEl.innerHTML = renderCode(await res.text());
    } catch (e) {
      codeEl.className = "code-err";
      codeEl.textContent = "couldn’t load " + src +
        " — serve this folder over http (run: python3 -m http.server) rather than opening the file directly.";
    }
  }
}

/* ---------- the filter ----------
   setCollapsed animates one element open or shut. It measures the live height,
   then runs a height + margin + padding + opacity animation with the Web
   Animations API, and only sets display:none once the shut animation finishes —
   so a hidden entry takes up no space and leaves no gap. Reduced motion, or a
   non-animated (re)paint, gets an instant toggle. State lives on the element
   (_collapsed / _anim), so repeated calls are idempotent and interruptible. */
const EASE = "cubic-bezier(.4, 0, .2, 1)";
const COLLAPSE_MS = 260;

function setCollapsed(el, collapsed, animate) {
  const settled = el._collapseInit && el._collapsed === collapsed && !el._anim;
  if (settled) return;
  el._collapseInit = true;
  el._collapsed = collapsed;
  if (el._anim) { el._anim.cancel(); el._anim = null; }
  el.classList.toggle("is-collapsed", collapsed);

  if (!animate || reduced.matches) {
    el.style.display = collapsed ? "none" : "";
    el.style.overflow = ""; el.style.height = "";
    return;
  }

  if (collapsed) {
    const h = el.getBoundingClientRect().height;
    const cs = getComputedStyle(el);
    el.style.overflow = "hidden";
    el._anim = el.animate([
      { height: h + "px", opacity: 1, marginTop: cs.marginTop, marginBottom: cs.marginBottom,
        paddingTop: cs.paddingTop, paddingBottom: cs.paddingBottom },
      { height: "0px", opacity: 0, marginTop: "0px", marginBottom: "0px",
        paddingTop: "0px", paddingBottom: "0px" }
    ], { duration: COLLAPSE_MS, easing: EASE });
    el._anim.onfinish = () => { el.style.display = "none"; el.style.overflow = ""; el._anim = null; };
  } else {
    el.style.display = "";
    el.style.overflow = "hidden";
    const cs = getComputedStyle(el);
    /* getBoundingClientRect gives the exact sub-pixel, border-box height, so the
       final keyframe lands precisely where the natural layout does — no snap when
       the inline height is cleared on finish. (scrollHeight rounds and drops the
       border, which is what caused the little jag on reappear.) */
    const h = el.getBoundingClientRect().height;
    el._anim = el.animate([
      { height: "0px", opacity: 0, marginTop: "0px", marginBottom: "0px",
        paddingTop: "0px", paddingBottom: "0px" },
      { height: h + "px", opacity: 1, marginTop: cs.marginTop, marginBottom: cs.marginBottom,
        paddingTop: cs.paddingTop, paddingBottom: cs.paddingBottom }
    ], { duration: COLLAPSE_MS, easing: EASE });
    el._anim.onfinish = () => { el.style.overflow = ""; el.style.height = ""; el._anim = null; };
  }
}

/* one document-level handler closes the menu on an outside click / Escape.
   Bound once; it looks the control up by id so it survives repaints. */
let filterDocBound = false;
function bindFilterDoc() {
  if (filterDocBound) return;
  filterDocBound = true;
  const shut = () => {
    const r = document.getElementById("filter");
    if (r) { r.dataset.open = "false"; r.querySelector(".filter-btn").setAttribute("aria-expanded", "false"); }
  };
  document.addEventListener("click", e => {
    const r = document.getElementById("filter");
    if (r && !r.contains(e.target)) shut();
  });
  document.addEventListener("keydown", e => { if (e.key === "Escape") shut(); });
}

/* wires the freshly-painted filter control and applies the active subject. Runs
   after every home paint; a no-op on pages without the control. */
function setupFilter() {
  const root = document.getElementById("filter");
  if (!root) return;
  bindFilterDoc();

  const btn = document.getElementById("filterBtn");
  const menu = document.getElementById("filterMenu");
  const labelEl = document.getElementById("filterLabel");
  const hint = document.getElementById("filterHint");
  const opts = Array.from(menu.querySelectorAll(".filter-opt"));

  const groups = ["sec-work", "sec-project", "sec-extras"].map(id => {
    const blockEl = document.getElementById(id);
    if (!blockEl) return null;
    return { blockEl, items: Array.from(blockEl.querySelectorAll("[data-subjects]")) };
  }).filter(Boolean);

  const labelFor = key => (opts.find(o => o.dataset.subject === key)?.textContent || "everything").trim();
  const matches = (item, subject) =>
    subject === "" || (item.getAttribute("data-subjects") || "").split(/\s+/).includes(subject);

  function apply(subject, animate) {
    activeSubject = subject;
    let shown = 0;

    groups.forEach(g => {
      const keep = g.items.filter(it => matches(it, subject));
      const wasEmpty = g.blockEl._collapsed === true;
      const nowEmpty = keep.length === 0;

      if (nowEmpty) {
        setCollapsed(g.blockEl, true, animate);
      } else if (wasEmpty) {
        /* the whole section was hidden: set item states instantly, then slide
           the section in as one piece. */
        g.items.forEach(it => setCollapsed(it, !keep.includes(it), false));
        setCollapsed(g.blockEl, false, animate);
      } else {
        setCollapsed(g.blockEl, false, false);
        g.items.forEach(it => setCollapsed(it, !keep.includes(it), animate));
      }
      shown += keep.length;
    });

    labelEl.textContent = labelFor(subject);
    labelEl.classList.toggle("is-active", subject !== "");
    opts.forEach(o => o.setAttribute("aria-selected", String(o.dataset.subject === subject)));
    if (hint) hint.textContent = subject === ""
      ? "showing everything"
      : (shown === 1 ? "1 entry" : shown + " entries") + " tagged " + labelFor(subject);

    indexPin();
  }

  const setOpen = on => {
    root.dataset.open = String(on);
    btn.setAttribute("aria-expanded", String(on));
    if (on) { const sel = opts.find(o => o.getAttribute("aria-selected") === "true"); (sel || opts[0]).focus(); }
  };
  const focusOpt = i => opts[Math.max(0, Math.min(opts.length - 1, i))].focus();
  const choose = o => { apply(o.dataset.subject, true); setOpen(false); btn.focus(); };

  btn.addEventListener("click", e => { e.stopPropagation(); setOpen(root.dataset.open !== "true"); });
  /* Enter/Space are left to the native button click (which toggles above); only
     the arrow keys need handling, to open straight into the list. */
  btn.addEventListener("keydown", e => {
    if (e.key === "ArrowDown" || e.key === "ArrowUp") { e.preventDefault(); setOpen(true); }
  });
  opts.forEach((o, i) => {
    o.addEventListener("click", () => choose(o));
    o.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); choose(o); }
      else if (e.key === "ArrowDown") { e.preventDefault(); focusOpt(i + 1); }
      else if (e.key === "ArrowUp")   { e.preventDefault(); focusOpt(i - 1); }
      else if (e.key === "Home")      { e.preventDefault(); focusOpt(0); }
      else if (e.key === "End")       { e.preventDefault(); focusOpt(opts.length - 1); }
    });
  });

  apply(activeSubject, false);   /* reflect persisted selection, no animation */
}

/* ---------- the pin ---------- */
const pin = document.getElementById("pin");
const PIN_LINE = 88;          /* the y where the pin reads the page */
let sections = [];

function indexPin() {
  sections = Array.from(view.querySelectorAll(".block"))
    .map(el => ({ el: el, label: el.querySelector(".rail-label") }))
    .filter(s => s.label && s.el.id !== "sec-filter")
    .map(s => ({ el: s.el, text: s.label.textContent }));
  updatePin();
}

function updatePin() {
  let here = null;
  for (const s of sections) {
    const r = s.el.getBoundingClientRect();
    if (r.top <= PIN_LINE && r.bottom > PIN_LINE) here = s;
  }
  if (here) {
    if (pin.textContent !== here.text) pin.textContent = here.text;
    pin.classList.add("on");
  } else {
    pin.classList.remove("on");
  }
}

let queued = false;
addEventListener("scroll", () => {
  if (queued) return;
  queued = true;
  requestAnimationFrame(() => { updatePin(); queued = false; });
}, { passive: true });
addEventListener("resize", updatePin, { passive: true });

function route(first) {
  if (first || reduced.matches) { paint(); view.classList.remove("leaving"); return; }
  view.classList.add("leaving");
  setTimeout(() => { paint(); view.classList.remove("leaving"); }, 180);
}

addEventListener("hashchange", () => route(false));
route(true);
</script>
</body>
</html>
